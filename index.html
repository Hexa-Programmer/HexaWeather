<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaWeather</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="theme-day"> <div id="loadingScreen">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <h1>Welcome to HexaWeather</h1>
</div>

<div class="container" id="appContainer">

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>HexaWeather</h2>
        </div>
        
        <div class="search-container">
            <input id="search" placeholder="Search city..." autocomplete="off" />
            <div id="suggestions" class="suggestions-dropdown"></div>
        </div>

        <div id="recent" class="recent-container"></div>
    </div>

    <div class="editor">
        <div class="display-card">
            <div class="editor-header">
                <button class="back-btn" onclick="closeWeather()">‹ Search</button>
                <button class="delete-btn" onclick="clearHistory()">Clear History</button>
            </div>

            <div class="weather-info">
                <h1 id="city">--</h1>
                <div class="temp-wrapper">
                    <div id="weatherIcon" class="weather-icon">✨</div>
                    <div id="temp">--°C</div>
                </div>
                <div id="desc">Loading...</div>
            </div>

            <div id="forecast"></div>
        </div>
    </div>

</div>

</body>
</html>
