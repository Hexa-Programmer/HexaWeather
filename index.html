<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaWallet</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

<div id="loadingScreen">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <h1>Welcome to HexaWallet</h1>
</div>

<div class="container" id="appContainer">

    <div class="sidebar">

        <div class="sidebar-header">
            <h2>HexaWallet</h2>
            <button class="new-btn" onclick="createEntry()">
                New Entry
            </button>
        </div>

        <div id="entryList" class="entries-container"></div>

    </div>

    <div class="editor">

        <div class="display-card">

            <div class="editor-header">
                <button class="back-btn" onclick="closeEntry()">
                    ‹ Entries
                </button>

                <button class="delete-btn" onclick="deleteEntry()">
                    Delete
                </button>
            </div>

            <input
                id="serviceName"
                type="text"
                placeholder="Website / Service"
            >

            <input
                id="username"
                type="text"
                placeholder="Username / Email"
            >

            <div class="password-row">

                <input
                    id="password"
                    type="password"
                    placeholder="Password"
                >

                <button
                    class="icon-btn"
                    onclick="togglePassword()"
                >
                    Show Password
                </button>

            </div>

            <div class="generator-controls">

                <input
                    id="length"
                    type="range"
                    min="8"
                    max="64"
                    value="20"
                >

                <span id="lengthValue">20</span>

                <button
                    class="generate-btn"
                    onclick="generatePassword()"
                >
                    Generate Password
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
